<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cypherflix Hub</title>
</head>
<body>
<div id="cypherflixHubConfigurationPage" data-role="page" class="page type-interior pluginConfigurationPage" data-controller="__plugin/cypherflixHubConfigurationPage">
    <div data-role="content">
        <div class="content-primary">
            <form id="cypherflixHubConfigurationForm">
                <div class="inputContainer">
                    <input is="emby-input" id="BackendUrl" name="BackendUrl" type="url" required label="Backend URL" />
                    <div class="fieldDescription">
                        Base URL of cypherflix-grabber V2 (e.g. <code>http://192.168.1.165:7960</code>). No trailing slash.
                    </div>
                </div>
                <div class="inputContainer">
                    <input is="emby-input" id="ApiToken" name="ApiToken" type="password" label="API Token" />
                    <div class="fieldDescription">
                        Shared secret matching <code>CYPHERFLIX_API_TOKEN</code> on the backend. Leave blank if no token is configured.
                    </div>
                </div>
                <button is="emby-button" type="submit" class="raised button-submit block">
                    <span>Save</span>
                </button>
            </form>
        </div>
    </div>
    <script type="text/javascript">
        (function () {
            var pluginId = 'c1f1e571-7ba8-4d6a-9e2b-3a4f0c5d7e8b';
            document.querySelector('#cypherflixHubConfigurationPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        document.querySelector('#BackendUrl').value = config.BackendUrl || '';
                        document.querySelector('#ApiToken').value = config.ApiToken || '';
                        Dashboard.hideLoadingMsg();
                    });
                });
            document.querySelector('#cypherflixHubConfigurationForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        config.BackendUrl = document.querySelector('#BackendUrl').value || '';
                        config.ApiToken = document.querySelector('#ApiToken').value || '';
                        ApiClient.updatePluginConfiguration(pluginId, config)
                            .then(Dashboard.processPluginConfigurationUpdateResult);
                    });
                    return false;
                });
        }());
    </script>
</div>
</body>
</html>
