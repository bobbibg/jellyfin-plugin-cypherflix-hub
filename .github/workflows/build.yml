name: Build & Release

# Triggers on every push to main (after the manifest commit-back step
# we use "[skip ci]" in the commit message to avoid an infinite loop).
# Also supports manual dispatch for ad-hoc rebuilds.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Hard-stop on the manifest commit-back loop. The manifest commit ends
    # with "[skip ci]" so the default GitHub skip applies, but this is a
    # belt-and-braces guard in case someone tweaks the message.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We push the manifest update back to main, so we need a token
          # that can do that. GITHUB_TOKEN with contents: write is fine.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Read version from csproj
        id: version
        run: |
          set -euo pipefail
          CSPROJ="Jellyfin.Plugin.CypherflixHub/Jellyfin.Plugin.CypherflixHub.csproj"
          VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" "$CSPROJ")
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract <Version> from $CSPROJ"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${VERSION} already exists — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release v${VERSION} does not exist — proceeding with build."
          fi

      - name: Restore
        if: steps.release_check.outputs.exists == 'false'
        run: dotnet restore Jellyfin.Plugin.CypherflixHub/Jellyfin.Plugin.CypherflixHub.csproj

      - name: Publish
        if: steps.release_check.outputs.exists == 'false'
        run: |
          dotnet publish Jellyfin.Plugin.CypherflixHub/Jellyfin.Plugin.CypherflixHub.csproj \
            --configuration Release \
            --no-restore \
            -o out \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 \
            -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Verify and stage required DLLs
        if: steps.release_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          OUT=out
          BIN=Jellyfin.Plugin.CypherflixHub/bin/Release/net9.0
          STAGE=stage
          mkdir -p "$STAGE"

          echo "===== Files in publish output ($OUT) ====="
          ls -la "$OUT" || true
          echo "===== Files in build output ($BIN) ====="
          ls -la "$BIN" || true

          # The plugin DLL is mandatory.
          if [ ! -f "$OUT/Jellyfin.Plugin.CypherflixHub.dll" ]; then
            echo "ERROR: Jellyfin.Plugin.CypherflixHub.dll missing from publish output"
            exit 1
          fi
          cp "$OUT/Jellyfin.Plugin.CypherflixHub.dll" "$STAGE/"

          # Helper: stage a DLL. Try publish output first; fall back to bin/.
          # Fails if the file is in NEITHER location.
          stage_required () {
            local pattern="$1"
            local label="$2"
            local found=0
            for src in "$OUT" "$BIN"; do
              for f in "$src"/$pattern; do
                if [ -f "$f" ]; then
                  cp -n "$f" "$STAGE/"
                  found=1
                fi
              done
            done
            if [ "$found" -eq 0 ]; then
              echo "ERROR: required dependency $label ($pattern) not found in $OUT or $BIN"
              exit 1
            fi
          }

          # Helper: stage if present (no error if missing — for deps the host
          # provides at runtime that we still want to ship if produced).
          stage_optional () {
            local pattern="$1"
            for src in "$OUT" "$BIN"; do
              for f in "$src"/$pattern; do
                if [ -f "$f" ]; then
                  cp -n "$f" "$STAGE/" || true
                fi
              done
            done
          }

          # As of v1.0.0 the plugin is a thin C# shell + JS bundle: no Meilisearch,
          # no provider clients, no transitive deps the Jellyfin host doesn't
          # already provide. Newtonsoft.Json is needed for the File
          # Transformation plugin interop, but the host ships it -- so it's
          # optional and skipped if not present.
          stage_optional "Newtonsoft.Json.dll"

          echo "===== Staged files for zip ====="
          ls -la "$STAGE"

      - name: Package plugin zip
        if: steps.release_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          mkdir -p dist
          ZIP="dist/cypherflix-hub_${{ steps.version.outputs.version }}.zip"
          cd stage
          zip -j "$GITHUB_WORKSPACE/$ZIP" *.dll
          cd "$GITHUB_WORKSPACE"

          echo "===== Final zip ====="
          ls -la dist/
          unzip -l "$ZIP"

      - name: Compute checksum
        if: steps.release_check.outputs.exists == 'false'
        id: checksum
        run: |
          set -euo pipefail
          ZIP="dist/cypherflix-hub_${{ steps.version.outputs.version }}.zip"
          MD5=$(md5sum "$ZIP" | awk '{print $1}')
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          echo "MD5: $MD5"

      - name: Update manifest.json on main
        if: steps.release_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MD5: ${{ steps.checksum.outputs.md5 }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 - <<'PY'
          import json, os, datetime
          version   = os.environ["VERSION"]
          md5       = os.environ["MD5"]
          repo      = os.environ["GITHUB_REPOSITORY"]
          download  = f"https://github.com/{repo}/releases/download/v{version}/cypherflix-hub_{version}.zip"
          timestamp = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          with open("manifest.json", "r") as f:
              data = json.load(f)

          # Locate the Cypherflix Hub plugin entry by its known GUID.
          target_guid = "c1f1e571-7ba8-4d6a-9e2b-3a4f0c5d7e8b"
          plugin = next((p for p in data if p.get("guid") == target_guid), None)
          if plugin is None:
              raise SystemExit(f"ERROR: plugin with guid {target_guid} not found in manifest.json")

          entry = {
              "version":    f"{version}.0",
              "changelog":  "Automated release",
              "targetAbi":  "10.11.8.0",
              "sourceUrl":  download,
              "checksum":   md5,
              "timestamp":  timestamp,
          }

          versions = plugin.setdefault("versions", [])
          # Replace any existing entry for the same version; otherwise append.
          versions = [v for v in versions if v.get("version") != entry["version"]]
          versions.insert(0, entry)
          plugin["versions"] = versions

          with open("manifest.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

          git add manifest.json
          # "[skip ci]" stops this commit from re-triggering this workflow.
          if git commit -m "chore: update manifest for v${VERSION} [skip ci]"; then
            git push origin HEAD:main
          else
            echo "Nothing to commit — manifest already up to date."
          fi

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/cypherflix-hub_${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          target_commitish: main
